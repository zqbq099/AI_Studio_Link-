name: Kaabool Ultimate Success
on:
  push:
    branches: [ main ]

# هذا السطر يحل مشكلة التحذير الذي ظهر لك في الصورة
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Project
        run: |
          # حذف أي بقايا لمحاولات سابقة
          rm -rf MyProject
          
          # إنشاء المشروع باستخدام أحدث الأدوات المتوافقة
          npx @react-native-community/cli@latest init MyProject --version 0.73.0 --skip-install
          
          # التأكد من وجود الكود الذي أرسله كعبول ونسخه
          if [ -f App.js ]; then
            cp App.js MyProject/App.js
            echo "✅ App.js found and copied."
          else
            echo "❌ Error: App.js not found in root."
            exit 1
          fi
          
          cd MyProject
          npm install --legacy-peer-deps

      - name: Build Android APK
        run: |
          cd MyProject/android
          chmod +x gradlew
          # بناء نسخة Release خفيفة وسريعة
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kaabool-Final-APK
          path: MyProject/android/app/build/outputs/apk/release/*.apk
