name: Kaabool Final Success
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Project
        run: |
          # إنشاء المشروع باستخدام الأمر الصحيح والموصى به
          npx @react-native-community/cli init MyProject --version 0.73.0 --skip-install
          
          # نقل الكود الذي أرسله كعبول
          cp App.js MyProject/App.js
          
          # تثبيت المكتبات الضرورية (هذه الخطوة ستأخذ وقتاً لكنها تضمن النجاح)
          cd MyProject
          npm install --legacy-peer-deps

      - name: Build Android APK
        run: |
          cd MyProject/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kaabool-App
          path: MyProject/android/app/build/outputs/apk/debug/app-debug.apk
