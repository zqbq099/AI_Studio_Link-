name: Kaabool Super Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android Project (Fast Mode)
        run: |
          # إنشاء هيكل المشروع يدوياً لتوفير الوقت والذاكرة
          mkdir -p MyProject/android
          npx react-native@0.73.0 init MyProject --skip-install --version 0.73.0 --no-install
          
          # استبدال الكود بكود كعبول
          if [ -f App.js ]; then
            cp App.js MyProject/App.js
          fi
          
          cd MyProject/android
          chmod +x gradlew

      - name: Build APK
        run: |
          cd MyProject/android
          # تشغيل البناء مع تقليل استهلاك الذاكرة
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kaabool-App
          path: MyProject/android/app/build/outputs/apk/debug/app-debug.apk
