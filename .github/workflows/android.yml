name: Build Android APK (Optimized)
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup React Native
        run: |
          npm install -g react-native-cli
          npx react-native init KaaboolApp --version 0.72.0 --skip-install
          cp App.js KaaboolApp/App.js
          cd KaaboolApp
          npm install
      - name: Optimize and Build (Release)
        run: |
          cd KaaboolApp/android
          # تفعيل محرك Hermes لتقليل الحجم وزيادة السرعة
          sed -i 's/enableHermes: false/enableHermes: true/g' app/build.gradle
          # تقسيم التطبيق حسب نوع المعالج لتقليل الحجم (Split APKs)
          sed -i 's/enableSeparateBuildPerCPUArchitecture = false/enableSeparateBuildPerCPUArchitecture = true/g' app/build.gradle
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kaabool_Optimized_APK
          path: KaaboolApp/android/app/build/outputs/apk/release/*.apk
